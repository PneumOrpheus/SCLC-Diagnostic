experiment:
  name: 3d_swin_unetr
  notes: >-
    3D Swin-UNETR (BTCV-pretrained) with auxiliary segmentation loss. DAPT on
    Lung-PET-CT-Dx, fine-tune on BigLunge.

model_type: swin_unetr
mode: full

data:
  dapt_dataset: /home/data/Lung-PET-CT-Dx-Clean
  finetune_dataset: /home/data/TrainingData
  finetune_csv: /home/data/TrainingData/patients_parameters.csv

checkpoints:
  initial_checkpoint: /home/data/pre_trained_models/model_swin_unetr_btcv_segmentation_v1.pt
  model_checkpoint: ""
  checkpoint_dir: /home/data/trained_models
  output_dir: output

training:
  dapt_epochs: 30
  dapt_lr: 1.0e-4
  dapt_warmup_epochs: 3
  dapt_weight_decay: 3.0e-3
  finetune_epochs: 40
  finetune_lr: 3.0e-5
  finetune_warmup_epochs: 2
  warmup_start_lr: 1.0e-6
  finetune_backbone_lr_scale: 0.1
  weight_decay: 1.0e-3
  batch_size: 2
  accumulation_steps: 4
  monitor_rolling_window: 3
  seg_loss_weight: 0.1

system:
  num_workers: 4
  cache_workers: 4
  seed: 42
  disable_amp: false
  testing: false
  clear_cache: false

pipeline_3d:
  depth_size: 128
